{% extends "bookmodule/layouts/base.html" %}
{% block title %} Edit Book {% endblock title %}
{% block content %}

<h2>Edit Book</h2>
<form method="post" action="">
    {% csrf_token %}
    <label>Title:</label><br>
    <input type="text" name="title" value="{{ book.title }}"><br><br>

    <label>Price:</label><br>
    <input type="number" step="0.01" name="price" value="{{ book.price }}"><br><br>

    <label>Quantity:</label><br>
    <input type="number" name="quantity" value="{{ book.quantity }}"><br><br>

    <label>Rating (1-5):</label><br>
    <input type="number" name="rating" min="1" max="5" value="{{ book.rating }}"><br><br>

    <button type="submit">Save Changes</button>
    <a href="/books/lab9_part1/listbooks">Cancel</a>
</form>

{% endblock content %}
